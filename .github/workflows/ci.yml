name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Verify inference package contract
        run: |
          python -c "
          from inference.loader import get_model_and_processor
          from inference.preprocess import load_and_normalise, get_audio_duration_secs
          from inference.chunker import chunk_audio
          from inference.decoder import decode_logits
          from inference.postprocess import stitch_chunks
          from state.job_store import (
              create_job, update_job_chunk, complete_job, fail_job, load_all_jobs
          )
          print('Contract check passed: all public exports resolve.')
          "

      - name: Run tests
        run: pytest tests/ -v --tb=short
